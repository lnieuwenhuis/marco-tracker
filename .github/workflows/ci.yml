name: CI

on:
  pull_request:
    branches:
      - dev
      - staging
      - main
  push:
    branches:
      - dev
      - staging
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  checks:
    name: Tests, build, and browser smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Type-check packages
        run: pnpm typecheck

      - name: Lint web app
        run: pnpm lint

      - name: Build web app
        run: pnpm build
        env:
          APP_URL: http://localhost:3000
          DATABASE_URL: file:${{ runner.temp }}/macro-tracker-build.db
          SESSION_SECRET: ci-session-secret

      - name: Install Playwright browser
        run: pnpm --filter @macro-tracker/web exec playwright install --with-deps chromium

      - name: Run browser tests
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_PORT: 3100

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
          retention-days: 7
